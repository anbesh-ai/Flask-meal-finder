<!DOCTYPE html>
<html>
<head>
    <title>Add Member</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
    .form-control:focus {
        border-color: #f49595;
        box-shadow: 0 0 0 0.2rem rgba(94, 134, 86, 0.15);
    }
    .form-control {
        border-radius: 8px;
        border: 1px solid #ccc;
    }
    .card {
        border-radius: 16px;
    }
</style>
</head>
<body>
    <nav class="navbar navbar-dark bg-primary px-4">
        <span class="navbar-brand fw-bold">🌸 Samuha Sathi</span>
        <a href="/members" class="btn btn-light btn-sm">Back</a>
    </nav>

    <div class="container mt-5" style="max-width: 550px;">
    <div class="card shadow-lg border-0">
        <div class="card-header bg-dark text-white text-center py-3">
            <h4 class="mb-0">➕ Add New Member</h4>
        </div>
        <div class="card-body p-4">
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label fw-bold">Full Name</label>
                    <input type="text" name="name" class="form-control form-control-lg" 
                           placeholder="Full Name" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Phone Number</label>
                    <input type="number" name="phone" class="form-control form-control-lg"
                           placeholder="10 Digit number">
                </div>
                <div class="mb-3">
    <label class="form-label fw-bold">Province</label>
    <select name="province" id="province" class="form-select form-select-lg" 
            onchange="updateDistricts()" required>
        <option value=""> Select Province</option>
        {% for province in locations %}
        <option value="{{ province }}">{{ province }}</option>
        {% endfor %}
    </select>
</div>

<div class="mb-3">
    <label class="form-label fw-bold">District</label>
    <select name="district" id="district" class="form-select form-select-lg" required>
        <option value="">Select Province First --</option>
    </select>
</div>

<div class="mb-3">
    <label class="form-label fw-bold">Municipality / Village</label>
    <input type="text" name="municipality" class="form-control form-control-lg"
           placeholder="e.g. Bharatpur, Ratnanagar">
</div>

                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold">Joined Date</label>
                    <input type="date" name="joined_date" class="form-control form-control-lg">
                </div>
                <button type="submit" class="btn btn-dark w-100 btn-lg">
                    Add Member
                </button>
            </form>
        </div>
    </div>
</div>

<script>
const locations = {{ locations | tojson }};

function updateDistricts() {
    const province = document.getElementById("province").value;
    const districtSelect = document.getElementById("district");
    districtSelect.innerHTML = '<option value="">-- Select District --</option>';
    if (province && locations[province]) {
        locations[province].forEach(d => {
            districtSelect.innerHTML += `<option value="${d}">${d}</option>`;
        });
    }
}
</script>

</body>
</html>
