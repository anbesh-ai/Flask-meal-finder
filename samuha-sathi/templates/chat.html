{% extends "base.html" %}

{% block content %}
<div style="max-width: 650px; margin: auto;">
    <div class="card shadow-lg border-0">
        <div class="card-header bg-dark text-white text-center py-3">
            <h4 class="mb-0">🤖 Samuha Sathi Assistant</h4>
            <small>Ask anything about your group</small>
        </div>
        <div class="card-body p-4">

            {% if response %}
            <div class="alert alert-success">
                <strong>Assistant:</strong><br>
                {{ response }}
            </div>
            {% endif %}

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label fw-bold">Ask a question:</label>
                    <textarea name="message" class="form-control" rows="3"
                        placeholder="e.g. How can I manage savings for my group?"></textarea>
                </div>
                <button type="submit" class="btn btn-dark w-100 btn-lg">
                    Ask Assistant 🤖
                </button>
            </form>

        </div>
    </div>
</div>
{% endblock %}
