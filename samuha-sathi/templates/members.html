<!DOCTYPE html>
<html>
<head>
    <title>Members - Samuha Sathi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    

    
        {% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Members List</h2>
    <a href="/add_member" class="btn btn-dark">+ Add Member</a>
</div>
<table class="table table-striped table-bordered shadow">
    <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Phone</th>
            <th>Address</th>
            <th>Joined Date</th>
        </tr>
    </thead>
    <tbody>
        {% for member in members %}
        <tr>
            <td>{{ member[0] }}</td>
            <td>{{ member[1] }}</td>
            <td>{{ member[2] }}</td>
            <td>{{ member[3] }}</td>
            <td>{{ member[4] }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
            </tbody>
        </table>
    
</body>
</html>
